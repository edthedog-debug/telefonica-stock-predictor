name: Daily Stock Update

on:
  schedule:
    # Lunes a Viernes a las 17:30 UTC (19:30 hora España)
    - cron: '30 17 * * 1-5'
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install numpy
        sudo apt-get install -y bc curl
    
    - name: Make script executable
      run: chmod +x scripts/update-data.sh
    
    - name: Fetch REAL stock data & run predictions
      run: ./scripts/update-data.sh
    
    - name: Check for changes
      id: git-check
      run: |
        if git diff --quiet && git diff --staged --quiet; then
          echo "No changes"
          echo "changed=false" >> $GITHUB_OUTPUT
        else
          echo "Changes detected!"
          echo "changed=true" >> $GITHUB_OUTPUT
        fi
    
    - name: Commit and push changes
      if: steps.git-check.outputs.changed == 'true'
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add data/
        git commit -m "🤖 Auto-update: $(date +'%Y-%m-%d') - New closing price"
        git push
    
    - name: Summary
      run: |
        echo "## ✅ Update Complete" >> $GITHUB_STEP_SUMMARY
        echo "**Stock:** TEF.MC (Telefónica)" >> $GITHUB_STEP_SUMMARY
        echo "**Date:** $(date +'%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
        echo "**Next update:** Next trading day" >> $GITHUB_STEP_SUMMARY